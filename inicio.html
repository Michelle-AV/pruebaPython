<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .bienvenida {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
        }
        
        .bienvenida h1 {
            color: #667eea;
            margin: 0 0 20px 0;
            font-size: 2.5em;
        }
        
        .bienvenida p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="bienvenida">
        <h1>¡Bienvenido!</h1>
        <p>Nos alegra mucho tu visita. Estamos aquí para ayudarte.</p>
    </div>
</body>
</html>
